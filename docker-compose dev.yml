version: "3.9"

services:
  web:
    build: .
    container_name: 'nextjs_app'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOCAL_PORT: ${LOCAL_PORT}
      WEB_PORT: ${WEB_PORT}
    ports:
      - "${LOCAL_PORT}:${WEB_PORT}"
    networks:
      - payslip-application
    volumes:
      - .:/app
    restart: always
    depends_on:
      - database
    command: sh -c "npx prisma migrate deploy && npm run start"
  database:
    image: postgres:15
    container_name: postgres_db
    networks:
      - payslip-application
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresal/data

volumes:
  db_data:

networks:
  payslip-application:
    name: payslip-application
    driver: bridge
