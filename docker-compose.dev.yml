# version: "3.9"

services:
  web:
    build:
      target: development
    environment:
      NODE_ENV: "development"
    ports:
      - "${LOCAL_PORT}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    # command: sh -c "tail -f /dev/null"
    command: sh -c "npm install --no-audit --no-fund && npx prisma generate && npm run dev"
  database:
    ports:
      - "5432:5432"

volumes:
  node_modules:
  next_cache:
